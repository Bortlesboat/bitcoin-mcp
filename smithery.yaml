# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      bitcoinRpcHost:
        type: string
        description: Bitcoin Core RPC host (default 127.0.0.1)
      bitcoinRpcPort:
        type: string
        description: Bitcoin Core RPC port (auto-selected by network)
      bitcoinNetwork:
        type: string
        default: mainnet
        description: "Bitcoin network: mainnet, testnet, signet, or regtest"
      satoshiApiUrl:
        type: string
        description: Override the default hosted Satoshi API URL
      satoshiApiKey:
        type: string
        description: API key for authenticated access (free at bitcoinsapi.com)
  commandFunction:
    |-
    (config) => ({command:'uvx', args:['bitcoin-mcp'], env: Object.assign({}, config.bitcoinRpcHost ? {BITCOIN_RPC_HOST: config.bitcoinRpcHost} : {}, config.bitcoinRpcPort ? {BITCOIN_RPC_PORT: config.bitcoinRpcPort} : {}, config.bitcoinNetwork ? {BITCOIN_NETWORK: config.bitcoinNetwork} : {}, config.satoshiApiUrl ? {SATOSHI_API_URL: config.satoshiApiUrl} : {}, config.satoshiApiKey ? {SATOSHI_API_KEY: config.satoshiApiKey} : {})})
